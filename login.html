<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - TeleDrive</title>
    <style>
        :root {
            --bg: #0f1419;
            --card: #1a232e;
            --primary: #0088cc;
            --text: #e1e8ed;
            --text-muted: #8899a6;
            --border: #2f3b47;
            --danger: #f4212e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--card);
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-title {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
        }

        .logo-title span {
            color: var(--primary);
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
            transition: 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
            min-height: 48px;
            margin-bottom: 12px;
        }

        .btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .btn-google {
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .divider {
            text-align: center;
            color: var(--text-muted);
            margin: 20px 0;
            font-size: 14px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--border);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .toggle-auth span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }

        .error-msg {
            background: rgba(244, 33, 46, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
/* Loading Overlay */
.loading-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,20,25,.85);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    visibility:hidden;
    opacity:0;
    transition:.25s;
}

.loading-overlay.show{
    visibility:visible;
    opacity:1;
}

.spinner{
    width:55px;
    height:55px;
    border:5px solid rgba(255,255,255,.15);
    border-top:5px solid var(--primary);
    border-radius:50%;
    animation:spin .8s linear infinite;
    margin-bottom:18px;
}

.loading-text{
    font-size:15px;
    color:white;
    letter-spacing:.5px;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-title">📁 Tele<span>Drive</span></div>
            <div class="logo-subtitle">By Fachri Winanda v.1.1</div>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="authForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="nama@email.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Minimal 6 karakter" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Login</button>
        </form>

        <div class="divider">atau</div>

        <button class="btn btn-google" id="googleBtn">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
                <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
                <path fill="#FBBC05" d="M4.5 10.52a4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 7.18l2.67-2.07z"/>
                <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
            </svg>
            Login dengan Google
        </button>



    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVu0ga_ZuOX6XD1ywCchAyOeJDpQwWPMg",
            authDomain: "telecloud-67e66.firebaseapp.com",
            projectId: "telecloud-67e66",
            storageBucket: "telecloud-67e66.firebasestorage.app",
            messagingSenderId: "1098831073879",
            appId: "1:1098831073879:web:8f398990c31b08ca228912"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let isLogin = true;

        // Cek kalo udah login, langsung ke dashboard
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        window.toggleMode = function() {
            isLogin = !isLogin;
            document.getElementById('submitBtn').textContent = isLogin ? 'Login' : 'Daftar';
            document.getElementById('toggleText').innerHTML = isLogin 
                ? 'Belum punya akun? <span onclick="toggleMode()">Daftar</span>'
                : 'Sudah punya akun? <span onclick="toggleMode()">Login</span>';
            hideError();
        }

        function showError(msg) {
            const err = document.getElementById('errorMsg');
            err.textContent = msg;
            err.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        function setLoading(state){

    document.getElementById("loadingOverlay")
        .classList.toggle("show", state);

    document.getElementById("submitBtn").disabled = state;
    document.getElementById("googleBtn").disabled = state;

    document.getElementById("email").disabled = state;
    document.getElementById("password").disabled = state;

}

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    if (password.length < 6) {
                        showError('Password minimal 6 karakter');
                        setLoading(false);
                        return;
                    }
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                // onAuthStateChanged bakal redirect otomatis
            } catch (error) {
                setLoading(false);
                const errors = {
                    'auth/invalid-email': 'Email tidak valid',
                    'auth/user-not-found': 'Email belum terdaftar',
                    'auth/wrong-password': 'Password salah',
                    'auth/email-already-in-use': 'Email sudah terdaftar',
                    'auth/weak-password': 'Password terlalu lemah',
                    'auth/too-many-requests': 'Terlalu banyak percobaan. Coba lagi nanti'
                };
                showError(errors[error.code] || error.message);
            }
        });

        document.getElementById('googleBtn').addEventListener('click', async () => {
            hideError();
            setLoading(true);
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                setLoading(false);
                if (error.code !== 'auth/popup-closed-by-user') {
                    showError('Gagal login dengan Google');
                }
            }
        });
    </script>
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Sedang login...</div>
</div>
</body>
</html>
